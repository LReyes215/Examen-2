<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Plomería Reyes | Facturaciones</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Source+Sans+Pro:300,400,400i,700&display=fallback">
    <link rel="stylesheet" href="/plugins/fontawesome-free/css/all.min.css">
    <link rel="stylesheet" href="/dist/css/adminlte.min.css">
</head>
<body class="hold-transition sidebar-mini">
<div class="wrapper">

    <nav class="main-header navbar navbar-expand navbar-white navbar-light">
        <ul class="navbar-nav">
            <li class="nav-item">
                <a class="nav-link" data-widget="pushmenu" href="#" role="button"><i class="fas fa-bars"></i></a>
            </li>
        </ul>
        <ul class="navbar-nav ml-auto">
            <li class="nav-item">
                <a th:href="@{/auth/salir}" class="nav-link">
                    <i class="fas fa-sign-out-alt"></i> Salir
                </a>
            </li>
        </ul>
    </nav>

    <aside class="main-sidebar sidebar-dark-primary elevation-4">
        <a th:href="@{/}" class="brand-link">
            <span class="brand-text font-weight-light">Plomería Reyes</span>
        </a>
        <div class="sidebar">
            <div class="user-panel mt-3 pb-3 mb-3 d-flex">
                <div class="info">
                    <a href="#" class="d-block" th:text="${session.usuario.nombre}">Liliana Reyes</a>
                </div>
            </div>
            <nav class="mt-2">
                <ul class="nav nav-pills nav-sidebar flex-column" data-widget="treeview" role="menu">
                    <li class="nav-item">
                        <a th:href="@{/}" class="nav-link">
                            <i class="nav-icon fas fa-home"></i><p>Inicio</p>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a th:href="@{/servicios}" class="nav-link">
                            <i class="nav-icon fas fa-tools"></i><p>Servicios</p>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a th:href="@{/clientes}" class="nav-link">
                            <i class="nav-icon fas fa-users"></i><p>Clientes</p>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a th:href="@{/ventas}" class="nav-link">
                            <i class="nav-icon fas fa-shopping-cart"></i><p>Ventas</p>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a th:href="@{/facturas}" class="nav-link active">
                            <i class="nav-icon fas fa-file-invoice"></i><p>Facturación</p>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a th:href="@{/configuracion}" class="nav-link">
                            <i class="nav-icon fas fa-cog"></i><p>Configuración</p>
                        </a>
                    </li>
                </ul>
            </nav>
        </div>
    </aside>

    <div class="content-wrapper">
        <section class="content-header">
            <div class="container-fluid">
                <div class="row mb-2">
                    <div class="col-sm-6">
                        <h1>Facturaciones</h1>
                    </div>
                </div>
            </div>
        </section>

        <section class="content">
            <div class="container-fluid">
                <div class="card">
                    <div class="card-header">
                        <h3 class="card-title">Lista de Ventas</h3>
                    </div>
                    <div class="card-body table-responsive p-0">
                        <table class="table table-hover text-nowrap">
                            <thead>
                            <tr>
                                <th>Cliente</th>
                                <th>Fecha</th>
                                <th>Servicios</th>
                                <th>Total del día</th>
                                <th>Acciones</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="grupo : ${grupos}">
                                <td th:text="${grupo.nombreCliente}"></td>
                                <td th:text="${grupo.fecha}"></td>
                                <td th:text="${grupo.cantidad} + ' servicio(s)'"></td>
                                <td th:text="'$' + ${#numbers.formatDecimal(grupo.total, 1, 2)}"></td>
                                <td>
                                    <a th:href="@{/facturas/imprimir-dia/{idCliente}/{fecha}(idCliente=${grupo.idCliente}, fecha=${grupo.fecha})}"
                                       class="btn btn-warning btn-sm">
                                        <i class="fas fa-print"></i> Generar factura del día
                                    </a>
                                </td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <footer class="main-footer">
        <strong>Plomería Reyes &copy; 2026.</strong> Todos los derechos reservados.
    </footer>
</div>

<script src="/plugins/jquery/jquery.min.js"></script>
<script src="/plugins/bootstrap/js/bootstrap.bundle.min.js"></script>
<script src="/dist/js/adminlte.min.js"></script>
</body>
</html>
